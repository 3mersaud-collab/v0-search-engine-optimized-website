<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background for the icon version -->
  
  <!-- Cloud shape in cyan/teal -->
  <g transform="translate(100, 68)">
    <!-- Cloud body - multiple overlapping circles -->
    <circle cx="-14" cy="0" r="22" fill="#0ec4d8"/>
    <circle cx="8" cy="-8" r="24" fill="#0ec4d8"/>
    <circle cx="22" cy="2" r="18" fill="#0ec4d8"/>
    <circle cx="-2" cy="6" r="20" fill="#0ec4d8"/>
    <!-- Fill bottom of cloud -->
    <rect x="-34" y="0" width="70" height="20" fill="#0ec4d8" rx="0"/>
    <!-- Concave bottom via white rectangles to simulate flat bottom -->
    
    <!-- Rain drops - 3 curved lines -->
    <path d="M-16 20 Q-18 32 -20 42" stroke="#0ec4d8" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <path d="M0 22 Q-1 34 -2 44" stroke="#0ec4d8" stroke-width="4.5" stroke-linecap="round" fill="none"/>
    <path d="M16 20 Q15 32 14 42" stroke="#0ec4d8" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Arabic text rendered as foreignObject with proper font -->
  <!-- "مطر" main text - large and bold -->
  <text
    x="100"
    y="152"
    text-anchor="middle"
    font-size="54"
    font-weight="900"
    fill="white"
    font-family="Arial, sans-serif"
    direction="rtl"
    unicode-bidi="bidi-override"
  >مطر</text>

  <!-- Subtitle: سحابة غيث ماحسبت حسابها -->
  <text
    x="100"
    y="174"
    text-anchor="middle"
    font-size="10.5"
    font-weight="300"
    fill="#90b8c5"
    font-family="Arial, sans-serif"
    direction="rtl"
    unicode-bidi="bidi-override"
    letter-spacing="0.3"
  >سحابة غيث ماحسبت حسابها</text>
</svg>
